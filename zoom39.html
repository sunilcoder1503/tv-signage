<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TV Signage Wrapper 39%</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
    }

    .iframe-container {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    iframe {
      width: 256.4%;  /* Offsets the 39% zoom layout */
      height: 256.4%; /* Offsets the 39% zoom layout */
      border: none;
      transform: scale(0.39); /* Forces exactly 39% zoom */
      transform-origin: top left; 
    }
  </style>
</head>
<body>

  <div class="iframe-container">
    <!-- REPLACE THE URL BELOW WITH YOUR TARGET WEBSITE -->
    <iframe src="https://enrolmentdisplay.ihm.edu.au/"></iframe>
  </div>

</body>
</html>
