<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TV Signage Wrapper</title>
  <style>
    /* Reset margins and hide any overflowing scrollbars */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
    }

    /* Wrap and scale the target website down to 60% */
    .iframe-container {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    iframe {
      width: 100%;  /* Offsets the 60% scale reduction so layout stays wide */
      height: 100%;  /* Offsets the 60% scale reduction so layout stays tall */
      border: none;
      transform: scale(1.0); /* Forces the target site to exactly 60% zoom */
      transform-origin: top left; /* Ensures scaling anchors perfectly to the upper left */
    }
  </style>
</head>
<body>

  <div class="iframe-container">
    <!-- REPLACE THE URL BELOW WITH YOUR TARGET WEBSITE -->
        <iframe src="https://www.tradingview.com/chart/FpqGI0r8/?symbol=SPCFD%3ASPX"></iframe>
  </div>

</body>
</html>
