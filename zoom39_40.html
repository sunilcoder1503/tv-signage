<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TV Signage Wrapper - Perfect Fit</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
    }

    .iframe-container {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    iframe {
      width: 256.4%;  /* Matches 39% width (100 / 0.39) */
      height: 250%;   /* Matches 40% height (100 / 0.40) */
      border: none;
      /* This line scales the width to 39% and height to 40% separately */
      transform: scale(0.39, 0.40); 
      transform-origin: top left; 
    }
  </style>
</head>
<body>

  <div class="iframe-container">
    <!-- REPLACE THE URL BELOW WITH YOUR TARGET WEBSITE -->
     <iframe src="https://enrolmentdisplay.ihm.edu.au/"></iframe>
  </div>

</body>
</html>
