<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TV Signage Wrapper</title>
  <style>
    /* Reset margins and hide any overflowing scrollbars */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000; /* Keeps screen clean during load */
    }

    /* Wrap and scale the target website down to 50% */
    .iframe-container {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    iframe {
      width: 200%;  /* Doubles width to offset the 50% scale reduction */
      height: 200%; /* Doubles height to offset the 50% scale reduction */
      border: none;
      transform: scale(0.50); /* Forces the target site down to 50% zoom */
      transform-origin: top left; /* Ensures scaling anchors perfectly to the upper left */
    }
  </style>
</head>
<body>

  <div class="iframe-container">
    <!-- REPLACE THE URL BELOW WITH THE WEBSITE YOU WANT TO SHOW ON THE TV -->
    <iframe src="https://enrolmentdisplay.ihm.edu.au/"></iframe>
  </div>

</body>
</html>
